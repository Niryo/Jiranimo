<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jiranimo Dashboard</title>
  <link rel="icon" href="logo-mark.svg?v=2" type="image/svg+xml">
  <link rel="shortcut icon" href="logo-mark.svg?v=2" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <img src="logo-mark.svg?v=2" alt="Jiranimo logo" class="brand-mark">
      <h1>Jiranimo</h1>
    </div>
    <div id="status-bar">
      <span id="ws-status" class="disconnected">Disconnected</span>
      <span id="task-counts"></span>
    </div>
  </header>

  <main>
    <section id="queued-section">
      <h2>Queued</h2>
      <div id="queued-tasks" class="task-list"></div>
    </section>

    <section id="in-progress-section">
      <h2>In Progress</h2>
      <div id="in-progress-tasks" class="task-list"></div>
    </section>

    <section id="interrupted-section">
      <h2>Interrupted</h2>
      <div id="interrupted-tasks" class="task-list"></div>
    </section>

    <section id="completed-section">
      <h2>Completed</h2>
      <div id="completed-tasks" class="task-list"></div>
    </section>

    <section id="failed-section">
      <h2>Failed</h2>
      <div id="failed-tasks" class="task-list"></div>
    </section>
  </main>

  <!-- Conversation Log Modal -->
  <div id="conv-modal" class="modal-overlay" style="display:none" onclick="closeConvModal(event)">
    <div class="modal">
      <div class="modal-header">
        <span id="conv-modal-title">Conversation Log</span>
        <div class="modal-header-actions">
          <div class="log-tabs" id="log-tabs">
            <button class="log-tab active" id="tab-compact" onclick="switchLogTab('compact')">Compact</button>
            <button class="log-tab" id="tab-full" onclick="switchLogTab('full')">Full</button>
          </div>
          <button class="btn-copy" id="btn-copy-log" onclick="copyLogToClipboard()" title="Copy to clipboard">Copy</button>
          <button class="modal-close" onclick="closeConvModal()">✕</button>
        </div>
      </div>
      <div id="conv-modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
