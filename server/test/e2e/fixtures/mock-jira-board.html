<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JTEST board — Mock Jira</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; color: #172b4d; }

    .board-header {
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid #dfe1e6;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .board-header h1 { font-size: 20px; }
    .sprint-badge { background: #0052cc; color: #fff; padding: 2px 8px; border-radius: 3px; font-size: 12px; }

    .board {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      overflow-x: auto;
    }

    .column {
      flex: 0 0 280px;
      background: #ebecf0;
      border-radius: 4px;
      padding: 8px;
    }
    .column-header {
      font-size: 12px;
      font-weight: 600;
      color: #5e6c84;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 4px;
    }
    [role="columnheader"] { /* for selector matching */ }

    .card {
      background: #fff;
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 6px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      cursor: pointer;
      position: relative;
    }
    .card:hover { background: #f4f5f7; }
    .card-summary { font-size: 14px; margin-bottom: 8px; }
    .card-key { font-size: 12px; color: #0052cc; text-decoration: none; }
    .card-key:hover { text-decoration: underline; }
    .card-labels { display: flex; gap: 4px; margin-top: 6px; }
    .label {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
    }
    .label-ai-ready { background: #e3fcef; color: #006644; }
    .label-frontend { background: #deebff; color: #0747a6; }
    .label-bug { background: #ffebe6; color: #bf2600; }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .avatar { width: 24px; height: 24px; border-radius: 50%; background: #dfe1e6; }
    .priority { font-size: 12px; }
  </style>
</head>
<body>
  <div class="board-header">
    <h1>JTEST board</h1>
    <span class="sprint-badge">Sprint 1</span>
  </div>

  <div class="board">
    <!-- TO DO column -->
    <div class="column">
      <div class="column-header" role="columnheader" data-testid="column-header-todo">To Do</div>

      <div class="card" data-testid="platform-board-kit.ui.card.card" data-rbd-draggable-id="JTEST-101">
        <div class="card-summary">Add user authentication flow</div>
        <a class="card-key" href="/browse/JTEST-101">JTEST-101</a>
        <div class="card-labels">
          <span class="label label-ai-ready" data-testid="label">ai-ready</span>
          <span class="label label-frontend" data-testid="label">frontend</span>
        </div>
        <div class="card-meta">
          <div class="avatar"></div>
          <span class="priority">High</span>
        </div>
      </div>

      <div class="card" data-testid="platform-board-kit.ui.card.card" data-rbd-draggable-id="JTEST-102">
        <div class="card-summary">Update README with setup instructions</div>
        <a class="card-key" href="/browse/JTEST-102">JTEST-102</a>
        <div class="card-labels">
          <!-- No ai-ready label -->
        </div>
        <div class="card-meta">
          <div class="avatar"></div>
          <span class="priority">Low</span>
        </div>
      </div>

      <div class="card" data-testid="platform-board-kit.ui.card.card" data-rbd-draggable-id="JTEST-103">
        <div class="card-summary">Fix pagination bug on search results</div>
        <a class="card-key" href="/browse/JTEST-103">JTEST-103</a>
        <div class="card-labels">
          <span class="label label-ai-ready" data-testid="label">ai-ready</span>
          <span class="label label-bug" data-testid="label">bug</span>
        </div>
        <div class="card-meta">
          <div class="avatar"></div>
          <span class="priority">Medium</span>
        </div>
      </div>
    </div>

    <!-- IN PROGRESS column -->
    <div class="column">
      <div class="column-header" role="columnheader" data-testid="column-header-inprogress">In Progress</div>

      <div class="card" data-testid="platform-board-kit.ui.card.card" data-rbd-draggable-id="JTEST-100">
        <div class="card-summary">Set up CI/CD pipeline</div>
        <a class="card-key" href="/browse/JTEST-100">JTEST-100</a>
        <div class="card-labels">
          <span class="label label-ai-ready" data-testid="label">ai-ready</span>
        </div>
        <div class="card-meta">
          <div class="avatar"></div>
          <span class="priority">High</span>
        </div>
      </div>
    </div>

    <!-- DONE column -->
    <div class="column">
      <div class="column-header" role="columnheader" data-testid="column-header-done">Done</div>
    </div>
  </div>
</body>
</html>
