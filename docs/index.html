<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiranimo</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: rgba(255, 255, 255, 0.9);
        --text: #122033;
        --muted: #576579;
        --line: rgba(18, 32, 51, 0.12);
        --accent: #0b5bd3;
        --accent-soft: rgba(11, 91, 211, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(11, 91, 211, 0.14), transparent 28%),
          linear-gradient(180deg, #f7fbff 0%, var(--bg) 100%);
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 72px 24px 96px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 40px;
        box-shadow: 0 24px 70px rgba(28, 53, 87, 0.08);
        backdrop-filter: blur(12px);
      }

      .eyebrow {
        display: inline-block;
        padding: 7px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(42px, 7vw, 64px);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        max-width: 58ch;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 30px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        padding: 14px 18px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 700;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        border: 1px solid var(--line);
        color: var(--text);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <span class="eyebrow">Jiranimo</span>
        <h1>Local AI help for Jira boards.</h1>
        <p>
          Jiranimo combines a Chrome extension and a local server so you can send Jira issues
          into your own development workflow. The privacy policy for the Chrome Web Store listing
          is available below.
        </p>
        <div class="actions">
          <a class="primary" href="./privacy/">Privacy Policy</a>
          <a class="secondary" href="https://github.com/Niryo/Jiranimo">GitHub Repository</a>
        </div>
      </section>
    </main>
  </body>
</html>
