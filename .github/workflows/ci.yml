name: CI

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux rolldown binding
        run: npm install --no-save --ignore-scripts @rolldown/binding-linux-x64-gnu@1.0.0-rc.9

      - name: Run server tests
        run: npm run test:server

      - name: Run extension tests
        run: npm run test:extension

      - name: Set unique validation version
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          BASE_VERSION="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")"
          VALIDATION_VERSION="$(node -e "const [major, minor] = process.argv[1].split('.').map(Number); const prNumber = Number(process.env.PR_NUMBER || 0); const runAttempt = Number(process.env.GITHUB_RUN_ATTEMPT || 0); const patch = 10000 + ((prNumber % 5000) * 10) + (runAttempt % 10); process.stdout.write([major, minor, patch].join('.'));" "$BASE_VERSION")"
          echo "Using validation version $VALIDATION_VERSION for PR packaging"
          node scripts/set-version.mjs "$VALIDATION_VERSION"

      - name: Build production server bundle
        run: npm run build:server

      - name: Build production extension package
        run: npm run build:extension

      - name: Package release artifacts
        run: npm run package:release

      - name: Verify npm publish dry run
        run: |
          VERSION="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")"
          npm publish --dry-run --access public ".artifacts/release/jiranimo-${VERSION}.tgz"
